<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow &mdash; Task Manager</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="task.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="logo-area">
                <div class="logo-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"/><path d="m9 12 2 2 4-4"/></svg>
                </div>
                <h1>TaskFlow</h1>
            </div>
            
            <div class="header-actions">
                <div class="search-box">
                    <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
                    <input type="text" id="search-input" placeholder="Search tasks...">
                </div>
                <button id="theme-toggle" class="icon-btn" aria-label="Toggle Theme">
                    <!-- Sun Icon (shown in dark theme) -->
                    <svg class="sun-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>
                    <!-- Moon Icon (shown in light theme) -->
                    <svg class="moon-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
                </button>
            </div>
        </header>

        <!-- Main Content Grid -->
        <main class="app-content">
            <!-- Left Panel: Stats and Creation Form -->
            <aside class="sidebar">
                <!-- Stats Card -->
                <section class="card stats-card">
                    <h2>Performance Overview</h2>
                    <div class="stats-grid">
                        <div class="stat-item">
                            <span class="stat-label">Total</span>
                            <span class="stat-val" id="stats-total">0</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-label">Pending</span>
                            <span class="stat-val text-pending" id="stats-pending">0</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-label">Completed</span>
                            <span class="stat-val text-completed" id="stats-completed">0</span>
                        </div>
                    </div>
                    
                    <div class="progress-container">
                        <div class="progress-bar-header">
                            <span>Completion Rate</span>
                            <span id="stats-percentage">0%</span>
                        </div>
                        <div class="progress-bar-track">
                            <div class="progress-bar-fill" id="stats-progress" style="width: 0%"></div>
                        </div>
                    </div>
                </section>

                <!-- Task Creator Card -->
                <section class="card form-card">
                    <h2>Create New Task</h2>
                    <form id="task-form">
                        <div class="form-group">
                            <label for="task-title">Task Title</label>
                            <input type="text" id="task-title" placeholder="What needs to be done?" required>
                        </div>
                        
                        <div class="form-group">
                            <label for="task-desc">Description (Optional)</label>
                            <textarea id="task-desc" rows="3" placeholder="Add some details..."></textarea>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label for="task-priority">Priority</label>
                                <select id="task-priority">
                                    <option value="low">Low Priority</option>
                                    <option value="medium" selected>Medium Priority</option>
                                    <option value="high">High Priority</option>
                                </select>
                            </div>
                            
                            <div class="form-group">
                                <label for="task-category">Category</label>
                                <select id="task-category">
                                    <option value="Work">Work</option>
                                    <option value="Personal" selected>Personal</option>
                                    <option value="Shopping">Shopping</option>
                                    <option value="Health">Health</option>
                                    <option value="Finance">Finance</option>
                                </select>
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="task-due-date">Due Date</label>
                            <input type="date" id="task-due-date">
                        </div>

                        <button type="submit" class="btn btn-primary">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="btn-icon"><path d="M5 12h14"/><path d="M12 5v14"/></svg>
                            Add Task
                        </button>
                    </form>
                </section>
            </aside>

            <!-- Right Panel: Tasks View -->
            <section class="tasks-panel">
                <!-- Filters Toolbar -->
                <div class="toolbar">
                    <div class="filter-buttons">
                        <button class="filter-btn active" data-filter="all">All Tasks</button>
                        <button class="filter-btn" data-filter="pending">Pending</button>
                        <button class="filter-btn" data-filter="completed">Completed</button>
                    </div>
                    
                    <div class="sort-selector">
                        <label for="sort-select">Sort by:</label>
                        <select id="sort-select">
                            <option value="dateCreated-desc" selected>Newest First</option>
                            <option value="dateCreated-asc">Oldest First</option>
                            <option value="dueDate-asc">Due Date (Soonest)</option>
                            <option value="priority-desc">Priority (High to Low)</option>
                        </select>
                    </div>
                </div>

                <!-- Tasks List -->
                <div class="tasks-container">
                    <div class="tasks-list" id="tasks-list">
                        <!-- Tasks dynamically injected here -->
                    </div>
                    
                    <!-- Empty State -->
                    <div class="empty-state" id="empty-state" style="display: none;">
                        <div class="empty-state-icon">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="9" y1="15" x2="15" y2="15"/><line x1="9" y1="11" x2="15" y2="11"/><line x1="9" y1="19" x2="13" y2="19"/></svg>
                        </div>
                        <h3>No Tasks Found</h3>
                        <p>Get started by creating a task or adjusting your filters.</p>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- Edit Task Modal -->
    <div class="modal-overlay" id="edit-modal" style="display: none;">
        <div class="modal-card">
            <div class="modal-header">
                <h2>Edit Task</h2>
                <button id="close-modal" class="icon-btn" aria-label="Close modal">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
                </button>
            </div>
            
            <form id="edit-form">
                <input type="hidden" id="edit-task-id">
                
                <div class="form-group">
                    <label for="edit-task-title">Task Title</label>
                    <input type="text" id="edit-task-title" required>
                </div>
                
                <div class="form-group">
                    <label for="edit-task-desc">Description</label>
                    <textarea id="edit-task-desc" rows="3"></textarea>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="edit-task-priority">Priority</label>
                        <select id="edit-task-priority">
                            <option value="low">Low Priority</option>
                            <option value="medium">Medium Priority</option>
                            <option value="high">High Priority</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="edit-task-category">Category</label>
                        <select id="edit-task-category">
                            <option value="Work">Work</option>
                            <option value="Personal">Personal</option>
                            <option value="Shopping">Shopping</option>
                            <option value="Health">Health</option>
                            <option value="Finance">Finance</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label for="edit-task-due-date">Due Date</label>
                    <input type="date" id="edit-task-due-date">
                </div>

                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary" id="cancel-edit">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Changes</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Notification Toast System -->
    <div class="toast-container" id="toast-container"></div>

    <script src="task.js"></script>
</body>
</html>
